name: "hevy"
description: "Read and write Hevy workout data — log workouts, plan routines, track body measurements, and pull exercise history for AI trainer agents."
icon: "assets/icon.png"

auth:
  type: cred
  credentials:
    - name: "api_key"
      label: "Hevy Developer API Key"
      description: "Get your key at https://hevy.com/settings?developer (Hevy Pro subscription required)."
      placeholder: "00000000-0000-0000-0000-000000000000"
      secret: true
tools:
  - name: "get_user_info"
    description: "Look up the authenticated user's Hevy account ID, display name, and profile URL. Use when you need to confirm whose data you're working with or reference the user's public profile."
  - name: "list_workouts"
    description: "Browse the user's recent workouts (newest first, paginated). Use when summarizing training history, spotting trends, or finding a recent session to reference."
  - name: "get_workout_count"
    description: "Return how many workouts the user has ever logged. Use for totals, milestones, or to decide how far to paginate through list_workouts."
  - name: "get_workout_events"
    description: "Fetch workout changes (updated + deleted) since a date, pre-split into two typed lists for incremental sync. Use to keep a local cache fresh without refetching every workout."
  - name: "get_workout"
    description: "Fetch one workout's full exercise + set details by ID. Use after list_workouts when you need to reference or analyze a specific session."
  - name: "create_workout"
    description: "Log a completed workout (title, start/end time, exercises, sets). Use to record a session the user just finished. Requires real exercise_template_ids — pull them from list_exercise_templates first."
  - name: "update_workout"
    description: "Replace an existing workout by ID with a new full payload. Use to fix or amend an already-logged session. The whole workout is overwritten — send every exercise and set you want to keep."
  - name: "list_routines"
    description: "Browse the user's saved routines (workout templates they can start from). Use when recommending a routine to run or surveying their current program."
  - name: "get_routine"
    description: "Fetch one routine's full exercise/set/rest-timer details by ID. Use before suggesting modifications or starting a workout from it."
  - name: "create_routine"
    description: "Design a new routine (workout template the user can start later). Use when building a program, suggesting a new training day, or saving an LLM-generated plan. Can be placed into a specific folder."
  - name: "update_routine"
    description: "Replace a routine's title/notes/exercises by ID. Use to evolve a program (add a set, swap an exercise, adjust rest time). Full replacement — send everything you want to keep."
  - name: "list_exercise_templates"
    description: "Browse available exercises (name, muscle groups, equipment). Use to resolve an exercise_template_id for create_workout / create_routine, or to show the user what's available. Supports pageSize up to 100."
  - name: "get_exercise_template"
    description: "Fetch one exercise template's metadata (muscle groups, equipment, type) by ID. Use when you need the full definition of an exercise a workout references."
  - name: "create_custom_exercise_template"
    description: "Add a new custom exercise to the account (name, type, muscle group, equipment). Use when the user wants to log a lift Hevy doesn't have built in."
  - name: "list_routine_folders"
    description: "Browse the user's routine-organization folders (e.g. 'Push Pull', 'Hypertrophy Block'). Use to place new routines or navigate their program structure."
  - name: "get_routine_folder"
    description: "Fetch one routine folder's metadata by ID. Use when you need the folder title or timestamps for context."
  - name: "create_routine_folder"
    description: "Create a new routine folder (inserted at index 0). Use when organizing a new program phase or splitting routines by goal."
  - name: "get_exercise_history"
    description: "Pull every logged set for a specific exercise, optionally filtered by date range. Use to analyze progression, find a PR, or check recent volume/intensity on a lift."
  - name: "list_body_measurements"
    description: "Browse logged body measurements (weight, body fat, circumferences) newest first. Use for progress summaries, trend analysis, or to find the most recent measurement date."
  - name: "get_body_measurement"
    description: "Fetch a single day's body measurement snapshot by date (YYYY-MM-DD). Use when comparing specific dates or checking what was recorded on a given day."
  - name: "create_body_measurement"
    description: "Log a new body measurement for a specific date (weight, body fat, circumferences). Fails with a 409 if an entry for that date already exists — use update_body_measurement instead."
  - name: "update_body_measurement"
    description: "Safely merge-update a body measurement for a date: only the fields you pass are changed; unspecified fields keep their existing values. Use for partial updates like 'log today's weight' without overwriting other metrics."
