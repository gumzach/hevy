name: "hevy"
description: "Hevy Workout App MCP."
icon: "assets/icon.png"

auth:
  type: cred
  credentials:
    - name: "api_key"
      label: "Hevy Developer API Key"
      secret: true
tools:
  - name: "get_user_info"
    description: "Get info about the authenticated Hevy user."
  - name: "list_workouts"
    description: "Get a paginated list of workouts."
  - name: "get_workout_count"
    description: "Get the total number of workouts on the account."
  - name: "get_workout_events"
    description: "Get a paginated list of workout update/delete events since a given date, for incremental sync."
  - name: "get_workout"
    description: "Get a single workout's complete details by its ID."
  - name: "create_workout"
    description: "Create a new logged workout."
  - name: "update_workout"
    description: "Update an existing workout by ID."
  - name: "list_routines"
    description: "Get a paginated list of routines."
  - name: "get_routine"
    description: "Get a single routine by its ID."
  - name: "create_routine"
    description: "Create a new routine."
  - name: "update_routine"
    description: "Update an existing routine by ID."
  - name: "list_exercise_templates"
    description: "Get a paginated list of exercise templates available on the account."
  - name: "get_exercise_template"
    description: "Get a single exercise template by ID."
  - name: "create_custom_exercise_template"
    description: "Create a new custom exercise template."
  - name: "list_routine_folders"
    description: "Get a paginated list of routine folders."
  - name: "get_routine_folder"
    description: "Get a single routine folder by ID."
  - name: "create_routine_folder"
    description: "Create a new routine folder (inserted at index 0)."
  - name: "get_exercise_history"
    description: "Get exercise history entries for a specific exercise template, optionally filtered by date range."
  - name: "list_body_measurements"
    description: "Get a paginated list of body measurements for the authenticated user."
  - name: "get_body_measurement"
    description: "Get a single body measurement by date (YYYY-MM-DD)."
  - name: "create_body_measurement"
    description: "Create a body measurement entry for a given date."
  - name: "update_body_measurement"
    description: "Update an existing body measurement for a given date (all fields overwritten; omitted fields set to null)."
